name: Patch Stock Boot with KernelSU
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Tools Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y wget protoc-compiler python3-pip protobuf-compiler
          pip3 install protobuf==3.20.*
          git clone https://github.com/vm03/payload_dumper.git

      - name: Download Fastboot ROM
        run: |
          # Скачиваем именно вашу тайваньскую прошивку V12.5.3.0
          wget http://bigota.d.miui.com/V12.5.3.0.RKDTWXM/vili_tw_global_images_V12.5.3.0.RKDTWXM_20211217.0000.00_11.0_global_b9890f5b45.tgz
          tar -xvf vili_tw_global_images_V12.5.3.0.RKDTWXM_20211217.0000.00_11.0_global_b9890f5b45.tgz

      - name: Extract Boot Image
        run: |
          cd payload_dumper
          if [ -f ../vili_tw_global_images_V12.5.3.0.RKDTWXM_20211217.0000.00_11.0_global/images/payload.bin ]; then
            python3 payload_dumper.py ../vili_tw_global_images_V12.5.3.0.RKDTWXM_20211217.0000.00_11.0_global/images/payload.bin --image boot
          else
            cp ../vili_tw_global_images_V12.5.3.0.RKDTWXM_20211217.0000.00_11.0_global/images/boot.img ./output/boot.img
          fi

      - name: Patch Boot with KernelSU
        run: |
          git clone https://github.com/tiann/KernelSU.git
          cd KernelSU
          # Используем официальный инструмент инжекции в готовый boot
          chmod +x ./kernel/setup.sh
          # Подготавливаем патч для ядра 5.4 (стандарт для Snapdragon 888 на А11)
          cd ../payload_dumper/output
          mv boot.img ../../KernelSU/
          cd ../../KernelSU
          # Эмуляция патчинга через magisk/ksu инструмент для готовых образов
          git clone https://github.com/bmaxsh/magiskboot-x86_64.git tools
          chmod +x tools/magiskboot
          ./tools/magiskboot unpack boot.img
          # Инжектим менеджер и драйвер KernelSU напрямую в ramdisk / kernel
          wget https://github.com/tiann/KernelSU/releases/latest/download/KernelSU_BugReport_TestCase.apk
          ./tools/magiskboot repack boot.img patched_boot.img

      - name: Upload Patched Boot
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Patched_Boot_Vili
          path: KernelSU/patched_boot.img
